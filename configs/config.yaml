server:
  port: 8080
  mode: debug # debug, release, test
  read_timeout: 30s
  write_timeout: 30s

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: student_app
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 5m

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

jwt:
  secret: your-super-secret-key-change-in-production
  expire_hours: 24

cors:
  allow_origins:
    - http://localhost:5173
    - http://localhost:3000
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - Authorization
  allow_credentials: true

rate_limit:
  enabled: true
  requests_per_minute: 100
  burst: 10

log:
  level: info # debug, info, warn, error
  output: stdout # stdout, file
  file_path: logs/app.log

upload:
  max_size: 10 # MB
  allowed_types:
    - image/jpeg
    - image/png
    - image/gif
    - application/pdf
    - application/msword
    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
  upload_path: ./uploads

external_apis:
  schedule_api:
    base_url: https://eios.kosgos.ru
    timeout: 30s
  library_api:
    base_url: https://library.kosgos.ru/api
    timeout: 30s

websocket:
  ping_period: 54s
  pong_wait: 60s
  write_wait: 10s
  max_message_size: 512

email:
  host: smtp.gmail.com
  port: 587
  username: ""
  password: ""
  from: noreply@studentapp.com