version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: student_app_postgres_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: student_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - student_app_network_dev

  redis:
    image: redis:7-alpine
    container_name: student_app_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - student_app_network_dev

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: student_app_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@studentapp.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - student_app_network_dev

  mailhog:
    image: mailhog/mailhog:latest
    container_name: student_app_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - student_app_network_dev

volumes:
  postgres_data_dev:
  redis_data_dev:

networks:
  student_app_network_dev:
    driver: bridge